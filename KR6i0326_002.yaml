body:
  text: 梁天竺三藏真諦譯如來功德品第四佛告阿難有百八十不共之法此是如來勝妙功德一者三十二相二者八十種好三者六十八法何者三十二相菩薩修四因緣一持戒二禪定三者忍辱四者捨財及諸煩惱修此四因堅固不動以此業緣得二種相一者足下平滿所履踐地悉皆平夷稱菩薩腳無有坑坎二者行步平整無有斜戾若菩薩種種供養父母師長種種給濟苦難衆生去來往反勤行此事以此業緣得足下輪相轂輞成就千輻莊嚴若菩薩不逼惱他不行竊盜見他所愛不生貪奪不自矜高除却憍慢於師尊長起迎問訊侍立瞻奉合掌恭敬以此業緣得二種相一者手指纖長𦟛直沒節二者其身方大端政莊嚴具前三種業因緣故得足跟長行前三業更修四攝利益他事以此業緣手足十指悉皆網密猶如鵝王若菩薩於師父母扶持侍養自手塗傅蘇油膏藥按摩洗浴衣飴瞻視得手足柔軟潤澤細滑掌色赤好如紅蓮花若菩薩修諸善法心無厭惓增長上上得足踝𦟛滿若菩薩修學正法為他演說往來宣化不生疲極以是業緣得鹿王𨄔若菩薩未得之法勤求欲知已得之法利他轉化三種惡業斷塞不起六塵惡法不染身心於身病者施其湯藥於心病者為作良醫以此業緣得身端直若菩薩見怖畏者為作救護於貧裸者施與衣食恆懷慚愧遮惡不起以此業緣得陰馬藏若菩薩護身口意恆令清淨受施知足用亦知量施病者藥施貧者財若有衆生不平等業乃至受用亦不平等勸其修行平等之事以此業緣得身方滿從橫量等如尼拘類樹若菩薩方便巧修諸勝善法無中下品恆令增上以此業緣得身毛上靡右旋宛轉若菩薩自性利根多思惟義親近智者值善知識於尊長處灑掃清淨於尊長身洗持按摩於支提處除去糞穢客塵煩惱不令污心以此業緣得一孔一毛皮膚細滑不受塵水若菩薩衣服飲食車乘臥具諸莊嚴物歡喜施與心無悔吝以此業緣得身金色圓光一丈若菩薩軟美飲食廣施無限令多衆生悉得飽足以此業緣得七處滿若菩薩見善衆生欲興善法同其正業為其尊導安立善中除斷惡事以此業緣得師子臆若菩薩於衆生中為利益事修四正勤如師子王心無所畏以此業緣得二種相一者兩肩平整兩腋下滿二者兩臂圓直如象王鼻立過于膝若菩薩離兩舌業於怨憎中作和合語行四攝法攝取衆生思惟深義修平等慈以此業緣得二種相一者口四十齒齊密不疏白猶珂雪二者得四牙相如月初生若菩薩見諸衆生有所須欲稱心施與若財若法以此業緣得二種相一者師子頤二者頸圓淨若菩薩守護衆生如視一子多生信心慈念無量廣施醫藥無穢濁心以此業緣得二種相一者咽喉具足千脈以受美味津液流潤二者身鉤鎖骨如那羅延若菩薩自行十善教他修行見修行者歡喜讚歎大悲無量憐愍衆生發弘誓心攝受正法以此業緣得二種相一者有鬱尼沙頂骨涌起自然成髻二者舌廣薄長如蓮華葉若菩薩恆說實語愛語美語敷演正法不使顛倒以此業緣得梵音聲如迦陵頻伽妙響深遠如天鼓振若菩薩起慈敬心觀諸世間如父如母不起三毒視諸衆生以此業緣得二種相一者眼瞼青好如優鉢羅華二者眼睫紺焰猶如牛王若菩薩見善衆生修三學法稱讚其美不起毀呰見有謗者遮制守護以此業緣得白毫相當於眉間右旋上靡復次阿難菩薩修行四種正業得三十二相一者決定無雜二者諦觀微密三者常修無間四者不顛倒行第一業緣得足下平滿第二業緣得九種相一者足下輪相二者足踝𦟛滿三者手足十指網密四者皮膚細軟五者得七處滿六者兩肩平整兩腋下滿七者臂𦟛圓八者舌廣長九者師子臆第三業緣得五種相一者指纖長二者腳跟長三者身端不曲四者橫竪量等五者頸圓淨第四業緣得諸餘相復次阿難若十方一切衆生俱行十善如此功德更百倍增長以此業緣惟得菩薩一毛之相入一切毛功德更百倍增然後能得菩薩一好入一切好功德更百倍增然後能得菩薩一相入一切相功德離白毫相離鬱尼沙如是功德更增百倍得白毫相又增百倍得鬱尼沙相入鬱尼沙功德千倍增長得如來商珂不共之法相好所攝因此相好如來一聲遍滿十方無量世界阿難是三十二相有三因緣不可思議一者時節不可思議修行數滿三阿僧祇劫二者心樂不可思議為安樂利益一切衆生故三者品類不可思議修一切善離一切惡是種類無窮故是故如來身具相好不可思議阿難何者如來八十種好一者無見頂二者頂骨無頦三者額廣平正四者眉高而長形如初月紺琉璃色五者廣長眼六者鼻高圓直孔不現七者耳廣厚長輪埵成就八者身堅實如那羅延九者身分不可壞十者身節堅密十一者身一時回如象王十二者身柔軟十三者身不曲十四者身常少十五者身潤澤十六者身自持不逶迤十七者身分滿足十八者識滿足十九者容儀備足二十者威神遠振二十一者一切處不背他二十二者住處安無能動者二十三者面部如量不大不長二十四者廣姝二十五者面淨如滿月二十六者面具足滿二十七者正容貌不壞色二十八者儀容如師子二十九者進止如象王三十者行法如鵝王三十一者頭如摩陀那果三十二者足趺厚四指行時印文現三十三者爪如赤銅色高薄圓潤三十四者膝骨堅著圓好三十五者指文莊嚴三十六者脈理深三十七者手文明直三十八者手文長三十九者手文不斷四十者手足如意四十一者手足赤白如蓮華色四十二者孔門相具四十三者步無廣狹四十四者腰圓大四十五者腹不現四十六者齊文如盤蛇右轉圓深四十七者毛色青紅如孔雀項四十八者毛潔淨四十九者毛右旋五十者口出無上香身毛皆香氣五十一者脣色赤潤如頻婆果五十二者舌色赤五十三者舌形薄五十四者一切樂觀五十五者隨衆生意和悅與語五十六者於一切處無非善語五十七者先與語五十八者隨衆音聲不過不減五十九者隨衆語言而為說法六十者說法不著六十一者等視衆生六十二者先見後作六十三者發一音報衆聲六十四者次第有因緣說法六十五者一切衆生眼不能盡觀相六十六者觀無厭足六十七者一切聲分具足六十八者善事顯現六十九者剛強衆生見即調善怖畏衆生便得安樂七十者音聲明淨七十一者身不傾動七十二者身分大七十三者其身長七十四者身不染著七十五者遍身光各一丈七十六者光照身而行七十七者其身淨潔七十八者髮螺不亂其髮長好髮色光潤猶妙青珠七十九者手足滿八十者手足有德相阿難是名如來八十種好莊嚴佛身阿難如來有十力何者為十一者處非處智力二者隨業智力三者定類智力四者根品智力五者欲樂智力六者性類智力七者至一切處智力八者宿生智力九者死生智力十者漏盡智力因此智力如來顯說最大勝處轉於無上清淨梵輪於大衆中正師子吼阿難如來有四種無畏一一切智無畏二漏盡無畏三說障道無畏四說盡苦道無畏阿難如來有三種念處一者正行正念二者邪行正念三者雜行正念阿難如來又有大悲之法阿難如來有十八不共法一身無過二口無過三意無過四無不定心五無異相執六無非知捨七無欲樂無減失八無正精進無減失九無念無減失十無智無減失十一解脫無減十二解脫知見無減十三身隨智慧行十四口隨智慧行十五意隨智慧行十六窮過去智圓滿十七窮現在智圓滿十八窮未來智圓滿阿難如來獨得如意自在捷疾神通如來獨得無有邊際變化神通如來獨得無量無盡聖神通處如來獨得心自在法如來獨得自在無邊知他心通如來獨得自在無閡天耳神通如來獨得知無色界衆生種別如來獨得通達聖衆般涅槃後如來獨得智慧明了有不定答如來獨得大波羅蜜善能答問如來獨得分別說法無有過失如來獨得開化衆生無有空過如來獨得第一導首如來獨得不可害滅如來獨得金剛三昧如來獨得一切諸法非色非心心不相應如來至知如來獨得無閡解脫如來獨得三不護法如來獨得斷滅習氣如來獨得一切種智如來獨得金剛聚身如來獨得未曾作意一切事成如來獨得一切諸相與處相應明淨具足如來獨得所授記莂無有不定如來獨得於勝負心佛不許可不得見佛如來獨得轉一切種勝妙法輪如來獨得荷負衆生能捨重擔如來獨得入般涅槃復更起心如來獨得修因圓滿無餘如來獨得至果圓滿無餘如來獨得利益他事圓滿無餘如來獨得辨才無盡如來獨得說一切法悉皆如理阿難如來功德略說有六種一者具足二者無垢三者不動四者無閡五者利他六者自在巧能阿難云何如來為功德不可思議一切如來恆河沙劫無邊功德在於惑地及於淨地相攝相應未曾相離無垢無淨不可思議無上依經如來事品第五阿難如來事有十八如來無比最妙最上無有及者令諸衆生起奇特心恭敬供養此第一事因三十二相八十種好而得成就如來如理通達因果若沙門婆羅門說無因果說不平等因果之法我即制伏令墮負處此第二事因是處非處智力得成如來知見自業自受無有自作他受果者若沙門婆羅門邪說邪教度業度受便能制伏令墮負處此第三事因業類智力得成如來教化顯三種輪一者神通輪二者記心輪三者示教輪訓導弟子以成聖衆若沙門婆羅門有勝負心說違逆法對治正典便能制伏令墮負處此第四事因禪定智力得成如來了達上中下根如理為說令其下種成熟解脫此第五事因根種智力得成如來知見三品衆生邪正欲樂如實見已拔斷惡欲增長善欲此第六事因欲樂智力得成如來觀知衆生三種一者麁二者中三者妙令此三人如理得入種種法門此第七事因性界智力得成如來明見出離道法得解脫果障閡道法得生死果令滅障閡道修出離道此第八事因至一切處智力得成如來明了見宿命事說過去事為令衆生起厭畏心若執常見沙門婆羅門便能制伏令墮負處此第九事因宿生智力得成如來明見一切衆生死此生彼如理受記若執斷見沙門婆羅門便能制伏令墮負處此第十事因生死智力得成如來自知解脫通達無閡若增上慢沙門婆羅門未得羅漢謂言已得即能制伏令墮負處此第十一事因漏盡智力得成如來為利益事最上善巧若有人問如來十力如實答難除決彼疑能立自正說能破他邪說此第十二事因四無畏得成如來正教有能修者有不修者亦修不修者如來於此三人無染濁心此第十三事因三念處得成如來佛眼晝夜恆觀一切衆生在勝負處救護濟拔此第十四事因大悲得成如來如說而行能行能說此第十五事因三不護法得成如來於諸衆生為利益事悉皆圓滿無有損減此第十六事因念無忘失得成如來四威儀中隨從於理無有失誤此第十七事因滅除習氣得成如來觀三種法一者行法得利二者行法減損三者行法亦利亦損離餘二法如來宣說得利益行此第十八事因一切種智及諸不共法得成阿難如是等如來事汝應知阿難云何如來為事不可思議阿難諸如來事無數無量世間衆生不能覺知雖依語言不能顯現不可示人令他悟解一切佛土處無所閡一切如來隨順平等過於意境無分別相猶如虛空無有分別與法界相稱故諸善男子是故佛說如來之事不可思議行遍一切處一切處無失隨行三世處不滅三寶性如來住是事中如來身相不捨虛空性一切佛土顯現自身如來言說非音聲性同其類音而說正法如來不取心為境界諸衆生心根性欲樂皆悉通達阿難是名如來為事不可思議佛說此經已是此大會中七萬五千菩薩摩訶薩即得證見圓滿法身復有七萬五千菩薩摩訶薩即得大乘妙光三昧復有七萬五千菩薩摩訶薩於一切法得無生忍無數阿僧祇衆生於無上菩提起不退心無量阿僧祇衆生遠塵離垢得法眼淨復有無量衆生得增上果無上依經讚歎品第六爾時阿難於衆會中聞佛說已歡喜踊躍得未曾有從坐而起偏袒右肩右膝著地頂禮佛足恭敬合掌瞻仰尊顏以清淨心說偈讚歎於諸三世衆生中如來最尊無譬類於人法處無等等是故平等等一切所應伏滅悉永除所應知法悉通達為智為勝極第一惟佛世尊更非餘有力不怖是實語如來有力無畏故世尊大能不損他即是難思希有事善巧方便化衆生非是險惡心迷醉衆生邪慢自矜高世尊折伏令除捨若人有力能勝他謂是世間成口過若指如來最極尊此語至真無虛失若人依理正問難無有能使如來屈如來難伏無闕短將導衆生至樂處四種清淨無過失此四清淨故不護具足四辨無窮說法味充溢飽衆生一切法處智無閡一切念處無減失於諸衆生等大悲於諸世法心不染通達一切根欲性已度一切教化法煩惱品品差別類敷演種種對治門世尊說法最第一凡夫值佛不開解無明惑暗所覆蓋是等極難不可度世尊名聞令渴仰見佛令人喜無窮佛語能使心清淨大師正教脫生死歎佛能除不吉祥憶佛令心恆喜樂覓佛即生大般若解佛便得成種智如來因戒淨無垢如來因定意澄清如來因智不可動如來法海滿甘露衆生惛睡佛獨悟遍視衆生根性欲衆生放逸如來不一切衆生平等視破結賊法佛已說魔王幻化佛已除已示生死是過失已明彼方無畏處若法可度令他得猶如世尊行大悲提婆達多為最上一切衆生施菩提我今不能見正行修此持報世尊恩若人已到無餘滅此人猶未報佛恩若人能行佛正行是人唯修自利法世尊疲極為衆生無上深恩云何報世尊宣說真自法令人自行教化他若使如來不出世惟有苦受逼其身一切世間惟惡道但聞叫喚大音聲六道受苦悉無異皆因煩惱所纏裹世尊為解衆生結久受大悲之繫縛世尊無上大福田能依佛行正行者如我不見善寶窮若行惡行亦如是於佛若起悠悠心此等衆生墮負地忽於世尊起怨諍永處黑暗復何疑猶如大師識自身相似大師亦能識餘人不能如此識我今遍禮十方尊一切功德智力等世尊示現及法身大悲欲使衆生識是故我今頭面禮妙色好香視無厭衆相圓滿超諸色三時開敷甚可愛如是佛華我頂禮世尊善識無上處一切險難皆出離無迹無聚無虛假我今頂禮兩足尊世尊洗濯諸垢污住於正法功德水從本已來內外淨我今頂禮真淨身世尊善法自具足常能為衆作益厚廣雨甘露飽衆生我今頂禮能利他世間所敬最勝人此人猶故恭敬佛衆惡斷盡善圓滿我今頂禮最勝尊無一方便不修學為愍衆生欲拔濟令度生死險難坎我今頂禮世歸依頂禮無喻妙色身頂禮能說甘露法頂禮清淨離垢智頂禮一切功德林無上依經囑纍品第七佛告阿難汝可受持此正法門爾時阿難長跪白佛我今從佛聞此深法得未曾有頂戴奉持世尊當何名此經云何受持佛言阿難此經名無上依亦名未曾有亦名攝善法亦名清淨行亦名行究竟阿難有十種法受持此經何等為十一者書寫二者供養三者傳流四者諦聽五者自讀六者憶持七者廣說八者自誦九者思惟十者修行阿難此十種法能持此經真功德聚無量無盡阿難譬如如意珠王所在之處一切衆寶悉皆出現持此經人亦復如是一切善法皆悉得成阿難譬如一切樹林藥草悉依於地而得生長善法亦爾皆因此經而得增長阿難譬如一切善法已生現生當生是不放逸之所攝持不放逸行最為第一若經說聲聞法若經說緣覺法若經說菩薩法此經所攝最為第一阿難譬如轉輪聖王若王在世七寶常隨此經亦爾若住於世佛寶法寶僧寶種性相續不絶阿難汝可展轉廣為比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等演說此經何以故欲令一切諸衆生類於如來處種善根故佛說此經已阿難及大會菩薩摩訶薩帝釋梵衆護世天等聞佛所說希有法門歡喜踊躍信受奉行
